<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SavorIQ — Command Center</title>
    <style>
      body { margin: 0; background: #05070A; }
      #savoriq-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #05070A;
        transition: opacity 0.4s ease;
      }
      #savoriq-splash.hide { opacity: 0; pointer-events: none; }
      #savoriq-splash .logo {
        font-size: 36px; font-weight: 800; color: #FFF;
        letter-spacing: -1px; margin-bottom: 8px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #savoriq-splash .logo span { color: #D4A84B; }
      #savoriq-splash .tagline {
        font-size: 13px; color: #6B7280; margin-bottom: 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #savoriq-splash .spinner {
        width: 28px; height: 28px;
        border: 3px solid #1C2333; border-top-color: #D4A84B;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="savoriq-splash">
      <div class="logo">Savor<span>IQ</span></div>
      <div class="tagline">Initializing Command Center...</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
